{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="form-box">
    <h2>Create Account</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
